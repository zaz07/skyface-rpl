<ui:composition xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    template="/templates/layout.xhtml">

    <ui:define name="content">
        <h:form id="dashboardForm">
            <div style="display:flex; gap:20px; margin-bottom:20px;">
                <p:panel header="Total Users" style="text-align:center; flex:1;">
                    <h:outputText value="#{dashboardBean.totalUsers}" style="font-size:2.5em; font-weight:bold; color:var(--primary-color);"/>
                </p:panel>
                <p:panel header="Active" style="text-align:center; flex:1;">
                    <h:outputText value="#{dashboardBean.activeUsers}" style="font-size:2.5em; font-weight:bold; color:#27ae60;"/>
                </p:panel>
                <p:panel header="Inactive" style="text-align:center; flex:1;">
                    <h:outputText value="#{dashboardBean.inactiveUsers}" style="font-size:2.5em; font-weight:bold; color:#e74c3c;"/>
                </p:panel>
            </div>

            <p:panel header="Recent Users">
                <p:dataTable var="user" value="#{dashboardBean.recentUsers}" lazy="false" emptyMessage="No users.">
                    <p:column headerText="Username">#{user.username}</p:column>
                    <p:column headerText="Email">#{user.email}</p:column>
                    <p:column headerText="Role">#{user.role}</p:column>
                    <p:column headerText="Active">
                        <h:graphicImage name="images/check.png" rendered="#{user.active}" style="width:16px"/>
                    </p:column>
                </p:dataTable>
            </p:panel>
        </h:form>
    </ui:define>
</ui:composition>
