<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      dir="#{localeBean.dir}">
<f:view locale="#{localeBean.locale}">
    <f:loadBundle basename="messages" var="msg"/>
    <h:head>
        <title>#{msg['app.title']}</title>
        <style>
            body { margin:0; font-family:var(--font-family, "Open Sans","Helvetica Neue",sans-serif); }
            .topbar { background:var(--primary-color,#007bff); color:#fff; height:50px; display:flex; align-items:center; justify-content:space-between; padding:0 20px; }
            .topbar-title { font-size:1.3em; font-weight:bold; }
            .topbar-langs { display:flex; gap:4px; }
            .topbar-langs .ui-button { min-width:36px; height:28px; font-size:0.8em; }
            .topbar-langs .ui-button.ui-state-active { background:rgba(255,255,255,0.25); border-color:rgba(255,255,255,0.4); }
            .wrapper { display:flex; min-height:calc(100vh - 80px); }
            .sidebar { width:220px; background:#f4f4f4; border-inline-end:1px solid #ddd; padding:10px 0; }
            .content { flex:1; padding:20px; }
            .footer { background:#eee; height:30px; line-height:30px; padding:0 20px; font-size:0.8em; border-top:1px solid #ddd; }
        </style>
    </h:head>
    <h:body>
        <div class="topbar">
            <span class="topbar-title">#{msg['app.title']}</span>
            <span style="display:flex; align-items:center; gap:10px;">
                <h:outputText value="#{request.userPrincipal.name}" style="font-size:0.85em; opacity:0.9;"/>
                <span class="topbar-langs">
                    <h:form>
                        <p:commandButton value="FR" action="#{localeBean.switchToFrench}" process="@this" ajax="false"
                                         styleClass="#{localeBean.locale.language == 'fr' ? 'ui-state-active' : ''}"/>
                        <p:commandButton value="EN" action="#{localeBean.switchToEnglish}" process="@this" ajax="false"
                                         styleClass="#{localeBean.locale.language == 'en' ? 'ui-state-active' : ''}"/>
                        <p:commandButton value="AR" action="#{localeBean.switchToArabic}" process="@this" ajax="false"
                                         styleClass="#{localeBean.locale.language == 'ar' ? 'ui-state-active' : ''}"/>
                    </h:form>
                </span>
                <a href="#{request.contextPath}/logout" style="color:#fff; text-decoration:none; font-size:0.85em;">Logout</a>
            </span>
        </div>
        <div class="wrapper">
            <div class="sidebar">
                <p:menu>
                    <p:submenu label="#{msg['menu.dashboard']}">
                        <p:menuitem value="#{msg['menu.dashboard']}" icon="pi pi-home" outcome="/index"/>
                        <p:menuitem value="#{msg['menu.users']}" icon="pi pi-users" outcome="/admin-users"/>
                    </p:submenu>
                </p:menu>
            </div>
            <div class="content">
                <ui:insert name="content"/>
            </div>
        </div>
        <div class="footer">#{msg['app.title']}</div>
    </h:body>
</f:view>
</html>
